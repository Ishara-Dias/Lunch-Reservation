<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — JF&amp;I Lunch Bookings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap"
        rel="stylesheet" />
    <!-- SheetJS for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --primary: #FF6B35;
            --accent: #FFBE0B;
            --success: #00C897;
            --dark: #1A1A2E
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 40%, #0F3460 70%, #533483 100%);
            color: #fff;
        }

        /* Login gate */
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, .09);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: 28px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, .4);
            text-align: center;
            animation: fadeUp .7s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .login-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .login-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-card p {
            font-size: .88rem;
            color: rgba(255, 255, 255, .5);
            margin-bottom: 28px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .07);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border .3s, box-shadow .3s;
            margin-bottom: 14px;
        }

        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 107, 53, .18);
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, .3);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #FF6B35, #FFBE0B);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 107, 53, .4);
            transition: transform .2s, box-shadow .2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(255, 107, 53, .55);
        }

        .login-err {
            color: #FF6B6B;
            font-size: .82rem;
            margin-top: 10px;
            display: none;
        }

        /* Dashboard */
        #dashboard {
            display: none;
            padding: 30px 40px 60px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .dash-title h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .dash-title p {
            font-size: .88rem;
            color: rgba(255, 255, 255, .5);
            margin-top: 3px;
        }

        .dash-logo {
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: 3px;
            padding: 6px 18px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            text-transform: uppercase;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 18px;
            padding: 22px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform .2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-icon {
            font-size: 2rem;
        }

        .stat-num {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }

        .stat-lbl {
            font-size: .78rem;
            color: rgba(255, 255, 255, .5);
            margin-top: 3px;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .date-input {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1.5px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .07);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: .9rem;
            outline: none;
            cursor: pointer;
        }

        .date-input:focus {
            border-color: var(--primary);
        }

        .btn-load {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, .1);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, .15);
            transition: background .2s;
        }

        .btn-load:hover {
            background: rgba(255, 255, 255, .18);
        }

        .btn-excel {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1D6F42, #2D9D5E);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(29, 111, 66, .4);
            transition: transform .2s, box-shadow .2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-excel:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(29, 111, 66, .55);
        }

        .btn-logout {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1.5px solid rgba(255, 255, 255, .15);
            background: transparent;
            color: rgba(255, 255, 255, .7);
            font-family: 'Outfit', sans-serif;
            font-size: .85rem;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-logout:hover {
            background: rgba(255, 80, 80, .1);
            border-color: rgba(255, 80, 80, .4);
            color: #ff6b6b;
        }

        /* Table */
        .table-wrap {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .10);
            border-radius: 20px;
            overflow: hidden;
        }

        .tbl-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: rgba(255, 255, 255, .06);
        }

        thead th {
            padding: 14px 20px;
            text-align: left;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .5);
            white-space: nowrap;
        }

        tbody tr {
            border-top: 1px solid rgba(255, 255, 255, .06);
            transition: background .2s;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, .04);
        }

        tbody td {
            padding: 14px 20px;
            font-size: .92rem;
            color: rgba(255, 255, 255, .85);
            white-space: nowrap;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 700;
        }

        .badge-special {
            background: rgba(255, 190, 11, .15);
            color: var(--accent);
            border: 1px solid rgba(255, 190, 11, .25);
        }

        .badge-normal {
            background: rgba(0, 200, 151, .12);
            color: var(--success);
            border: 1px solid rgba(0, 200, 151, .2);
        }

        /* Empty/loading states */
        .state-box {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, .4);
        }

        .state-box .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .state-box p {
            font-size: .95rem;
        }

        .spinner-big {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, .15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @media(max-width:600px) {
            #dashboard {
                padding: 20px 16px;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

    <!-- ── Login Gate ─────────────────────────────────────── -->
    <div class="login-wrap" id="loginWrap">
        <div class="login-card">
            <div class="login-icon">🔐</div>
            <h2>Admin Access</h2>
            <p>JF&amp;I Lunch Booking — Management Panel</p>
            <input type="password" class="login-input" id="pwdInput" placeholder="Enter admin password" />
            <button class="btn-login" id="loginBtn">🚀 Login</button>
            <div class="login-err" id="loginErr">⚠ Incorrect password. Try again.</div>
        </div>
    </div>

    <!-- ── Dashboard ──────────────────────────────────────── -->
    <div id="dashboard">
        <div class="dash-header">
            <div class="dash-title">
                <h1>📊 Lunch Bookings</h1>
                <p id="dashSubtitle">Loading...</p>
            </div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <span class="dash-logo">JF&amp;I Packaging</span>
                <button class="btn-logout" onclick="logout()">⬅ Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div>
                    <div class="stat-num" id="statTotal">—</div>
                    <div class="stat-lbl">Total Bookings</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🌟</div>
                <div>
                    <div class="stat-num" id="statSpecial">—</div>
                    <div class="stat-lbl">Special Rice</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🍚</div>
                <div>
                    <div class="stat-num" id="statNormal">—</div>
                    <div class="stat-lbl">Normal Rice</div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <input type="date" class="date-input" id="filterDate" />
                <button class="btn-load" onclick="loadBookings()">🔄 Load</button>
            </div>
            <div style="display:flex;gap:10px;">
                <button class="btn-excel" onclick="downloadExcel()">
                    <span>📥</span><span>Download Excel</span>
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <div class="tbl-scroll">
                <table id="bookingTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Emp No.</th>
                            <th>Emp Name</th>
                            <th>Rice Type</th>
                            <th>Date &amp; Time</th>
                            <th>Submitted At</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="6">
                                <div class="state-box">
                                    <div class="spinner-big"></div>
                                    <p>Loading bookings...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ─── CONFIG ──────────────────────────────────────────────────────
        const ADMIN_PASSWORD = 'jfi@admin2024';          // ← Change this
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHS0uTqWSs1_fnuZCqHKtYZ2nqAGhTFQBtXp_w-HT3m84rcYAI0nHQWlrGDXZsF3sZWA/exec'; // ← Paste URL here
        // ─────────────────────────────────────────────────────────────────

        let allData = [];

        // ── Login ─────────────────────────────────────────────────────────
        document.getElementById('loginBtn').addEventListener('click', tryLogin);
        document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

        function tryLogin() {
            const pwd = document.getElementById('pwdInput').value;
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('loginWrap').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                initDashboard();
            } else {
                document.getElementById('loginErr').style.display = 'block';
                document.getElementById('pwdInput').value = '';
                document.getElementById('pwdInput').focus();
            }
        }

        function logout() {
            document.getElementById('loginWrap').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('pwdInput').value = '';
        }

        // ── Init ──────────────────────────────────────────────────────────
        function initDashboard() {
            // Set today's date in filter
            const today = getSLDate();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('filterDate').value = `${yyyy}-${mm}-${dd}`;
            document.getElementById('dashSubtitle').textContent = `${dd}/${mm}/${yyyy} — Sri Lanka Time`;
            loadBookings();
        }

        function getSLDate() {
            const now = new Date();
            const utc = now.getTime() + now.getTimezoneOffset() * 60000;
            return new Date(utc + 5.5 * 3600000);
        }

        // ── Load bookings via JSONP (bypasses CORS from GitHub Pages) ────────
        function loadBookings() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="6"><div class="state-box"><div class="spinner-big"></div><p>Loading bookings...</p></div></td></tr>';

            const dateVal = document.getElementById('filterDate').value; // YYYY-MM-DD e.g. "2026-03-02"

            // Remove any previous JSONP script tag
            const old = document.getElementById('jsonpScript');
            if (old) old.remove();

            // Unique callback name
            const cbName = 'jfiAdminCb_' + Date.now();

            // Timeout in case Apps Script doesn't respond
            const timer = setTimeout(() => {
                delete window[cbName];
                tbody.innerHTML = '<tr><td colspan="6"><div class="state-box"><div class="icon">⚠️</div><p>Request timed out. Check the Apps Script URL and re-deploy.</p></div></td></tr>';
            }, 12000);

            window[cbName] = function (json) {
                clearTimeout(timer);
                delete window[cbName];

                const allRows = (json && json.data) || [];

                // Filter client-side using Submitted At column — handles both
                // DD/MM/YYYY (string) and ISO 2026-03-02T... (Google Sheets auto-converted date)
                if (dateVal) {
                    const [yyyy, mm, dd] = dateVal.split('-');
                    const fmtDDMMYYYY = `${dd}/${mm}/${yyyy}`;   // "02/03/2026"
                    const fmtISO = `${yyyy}-${mm}-${dd}`;   // "2026-03-02"
                    allData = allRows.filter(r => {
                        const sub = String(r['Submitted At'] || '');
                        const dt = String(r['Date & Time'] || '');
                        return sub.startsWith(fmtDDMMYYYY) ||
                            sub.startsWith(fmtISO) ||
                            dt.includes(fmtDDMMYYYY) ||
                            dt.includes(fmtISO) ||
                            dt.includes(`${dd} ${['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][parseInt(mm, 10) - 1]}`);
                    });
                } else {
                    allData = allRows;
                }
                renderTable(allData);
            };

            // Inject script tag — JSONP, no CORS issue
            const script = document.createElement('script');
            script.id = 'jsonpScript';
            script.src = APPS_SCRIPT_URL + '?callback=' + cbName;
            script.onerror = function () {
                clearTimeout(timer);
                delete window[cbName];
                tbody.innerHTML = '<tr><td colspan="6"><div class="state-box"><div class="icon">⚠️</div><p>Failed to reach the Apps Script. Check the URL and re-deploy.</p></div></td></tr>';
            };
            document.head.appendChild(script);
        }

        function renderTable(data, isDemo = false) {
            const tbody = document.getElementById('tableBody');
            const special = data.filter(r => r['Rice Type'] === 'Special Rice').length;
            const normal = data.filter(r => r['Rice Type'] === 'Normal Rice').length;
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statSpecial').textContent = special;
            document.getElementById('statNormal').textContent = normal;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="state-box"><div class="icon">🍽️</div><p>No bookings found for this date.</p></div></td></tr>';
                return;
            }

            tbody.innerHTML = data.map((row, i) => {
                const badge = row['Rice Type'] === 'Special Rice'
                    ? `<span class="badge badge-special">🌟 Special Rice</span>`
                    : `<span class="badge badge-normal">🍚 Normal Rice</span>`;
                return `<tr>
          <td style="color:rgba(255,255,255,.35)">${i + 1}</td>
          <td><strong>${row['Emp No'] || '—'}</strong></td>
          <td>${row['Emp Name'] || '—'}</td>
          <td>${badge}</td>
          <td>${row['Date & Time'] || '—'}</td>
          <td style="font-size:.82rem;color:rgba(255,255,255,.5)">${row['Submitted At'] || '—'}</td>
        </tr>`;
            }).join('');

            if (isDemo) {
                tbody.innerHTML += `<tr><td colspan="6" style="text-align:center;padding:12px;font-size:.8rem;color:rgba(255,190,11,.7)">⚠ Demo mode — paste your Apps Script URL in admin.html to see live data</td></tr>`;
            }
        }

        // ── Download Excel ────────────────────────────────────────────────
        function downloadExcel() {
            if (allData.length === 0) { alert('No data to export.'); return; }

            const dateVal = document.getElementById('filterDate').value || 'all';
            const rows = allData.map((r, i) => ({
                '#': i + 1,
                'Emp No': r['Emp No'] || '',
                'Emp Name': r['Emp Name'] || '',
                'Rice Type': r['Rice Type'] || '',
                'Date & Time': r['Date & Time'] || '',
                'Submitted At': r['Submitted At'] || '',
            }));

            const ws = XLSX.utils.json_to_sheet(rows);

            // Column widths
            ws['!cols'] = [{ wch: 5 }, { wch: 14 }, { wch: 24 }, { wch: 16 }, { wch: 28 }, { wch: 24 }];

            // Style header row bold (limited support in xlsx free)
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Lunch Bookings');

            const filename = `JFI_Lunch_Bookings_${dateVal}.xlsx`;
            XLSX.writeFile(wb, filename);
        }
    </script>
</body>

</html>
